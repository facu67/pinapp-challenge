<div class="login-container">
  <mat-card class="login-card mat-elevation-z4">
    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form-column">
        
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput formControlName="email" type="email" placeholder="ejemplo@correo.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">El correo es obligatorio.</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Formato de correo inválido.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">La contraseña es obligatoria.</mat-error>
        </mat-form-field>

        <!-- Mensaje de error de Firebase -->
        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || loading" class="submit-btn">
          {{ loading ? 'Ingresando...' : 'Entrar' }}
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
